name: Build Quick Support Client (Windows, Incoming-Only)

on:
  workflow_dispatch:
    inputs:
      rustdesk-ref:
        description: "RustDesk tag/branch to build from (e.g. '1.4.3' or 'master')"
        required: false
        default: ""
      upload-tag:
        description: "Release tag name for the built artifacts"
        required: false
        default: "nightly"

env:
  # ── RustDesk build-env (mirrored from upstream flutter-build.yml) ──
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.3"
  TAG_NAME: "${{ inputs.upload-tag }}"
  # ── upstream repo ──
  RUSTDESK_REPO: "rustdesk/rustdesk"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Resolve the RustDesk version to build
  # ─────────────────────────────────────────────────────────────────────
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pick.outputs.ref }}
    steps:
      - name: Determine ref
        id: pick
        shell: bash
        run: |
          INPUT_REF="${{ inputs.rustdesk-ref }}"
          if [[ -n "$INPUT_REF" ]]; then
            echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
          else
            # Fetch latest release tag from the RustDesk repo
            LATEST=$(curl -s "https://api.github.com/repos/${{ env.RUSTDESK_REPO }}/releases/latest" \
                     | jq -r '.tag_name')
            echo "Latest RustDesk release: $LATEST"
            echo "ref=$LATEST" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────
  # 2. Generate flutter-rust bridge (same as upstream bridge.yml)
  # ─────────────────────────────────────────────────────────────────────
  generate-bridge:
    needs: [resolve-ref]
    runs-on: ubuntu-22.04
    env:
      CARGO_EXPAND_VERSION: "1.0.95"
      BRIDGE_FLUTTER_VERSION: "3.22.3"
      FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
      BRIDGE_RUST_VERSION: "1.75"
    steps:
      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RUSTDESK_REPO }}
          ref: ${{ needs.resolve-ref.outputs.ref }}
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get install ca-certificates -y
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc git g++ \
            libclang-dev libgtk-3-dev llvm-dev \
            nasm ninja-build pkg-config wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.BRIDGE_RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-ubuntu-22.04

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.BRIDGE_FLUTTER_VERSION }}
          cache: true

      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          pushd flutter && sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml && flutter pub get && popd

      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Upload bridge artifact
        uses: actions/upload-artifact@master
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  # ─────────────────────────────────────────────────────────────────────
  # 3. Build RustDeskTempTopMostWindow (same as upstream)
  # ─────────────────────────────────────────────────────────────────────
  build-RustDeskTempTopMostWindow:
    runs-on: windows-2022
    steps:
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download the source code
        run: |
          git clone https://github.com/rustdesk-org/RustDeskTempTopMostWindow RustDeskTempTopMostWindow

      - name: Build the project
        run: |
          cd RustDeskTempTopMostWindow && git checkout 53b548a5398624f7149a382000397993542ad796
          msbuild WindowInjection/WindowInjection.vcxproj -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10

      - name: Archive build artifacts
        uses: actions/upload-artifact@master
        with:
          name: topmostwindow-artifacts
          path: |
            ./RustDeskTempTopMostWindow/WindowInjection/x64/Release/WindowInjection.dll

  # ─────────────────────────────────────────────────────────────────────
  # 4. Build Windows Flutter quick-support client (incoming-only)
  # ─────────────────────────────────────────────────────────────────────
  build-for-windows-flutter:
    name: x86_64-pc-windows-msvc (quick-support)
    needs: [resolve-ref, build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: windows-2022
    env:
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
    steps:
      # ── cache env ──
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── checkout RustDesk ──
      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RUSTDESK_REPO }}
          ref: ${{ needs.resolve-ref.outputs.ref }}
          submodules: recursive

      # ── checkout our repo (for custom assets) ──
      - name: Checkout custom assets
        uses: actions/checkout@v4
        with:
          path: _custom

      # ── restore bridge ──
      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      # ── replace logo / icons ──
      - name: Replace logo and icon assets
        shell: bash
        run: |
          CUSTOM="./_custom/assets/logo"
          if [ ! -d "$CUSTOM" ]; then
            echo "::warning::No custom logo directory found at assets/logo/ — using default RustDesk icons"
            exit 0
          fi
          echo "Replacing icons with custom logo assets..."
          # Windows executable icon
          [ -f "$CUSTOM/icon.ico" ]     && cp "$CUSTOM/icon.ico"     res/icon.ico
          # Source PNG (used by gen_icon.sh & flutter_launcher_icons)
          [ -f "$CUSTOM/icon.png" ]     && cp "$CUSTOM/icon.png"     res/icon.png
          # System-tray icon
          [ -f "$CUSTOM/tray-icon.ico" ] && cp "$CUSTOM/tray-icon.ico" res/tray-icon.ico
          # Flutter Windows runner icon
          [ -f "$CUSTOM/app_icon.ico" ] && cp "$CUSTOM/app_icon.ico" flutter/windows/runner/resources/app_icon.ico
          # In-app SVG logo
          [ -f "$CUSTOM/icon.svg" ]     && cp "$CUSTOM/icon.svg"     flutter/assets/icon.svg
          # Portable launcher label
          [ -f "$CUSTOM/label.png" ]    && cp "$CUSTOM/label.png"    libs/portable/src/res/label.png
          echo "Logo replacement done."

      # ── patch source: incoming-only mode ──
      - name: Patch for incoming-only mode
        shell: bash
        run: |
          # Patch config.rs to hardcode incoming-only mode
          sed -i 's/pub fn is_incoming_only() -> bool {/pub fn is_incoming_only() -> bool { return true; \/\/ patched for quick-support/' \
            libs/hbb_common/src/config.rs
          echo "Patched is_incoming_only() to always return true"

          # Verify the patch applied
          grep -n "is_incoming_only" libs/hbb_common/src/config.rs

      # ── patch source: disable settings mode ──
      - name: Patch for disable settings mode
        shell: bash
        run: |
          # Patch conifg.rs to disable settings access
          sed -i 's/pub fn is_disable_settings() -> bool {/pub fn is_disable_settings() -> bool { return true; \/\/ patched for quick-support/' \
            libs/hbb_common/src/config.rs
          echo "Patched is_disable_settings() to always return true"

          # Verify the patch applied
          grep -n "is_disable_settings" libs/hbb_common/src/config.rs

      # ── patch source: enable custom client mode ──
      - name: Patch for enable custom client mode
        shell: bash
        run: |
          # Patch conifg.rs to enable custom client
          sed -i 's/pub fn is_custom_client() -> bool {/pub fn is_custom_client() -> bool { return true; \/\/ patched for quick-support/' \
            libs/hbb_common/src/config.rs
          echo "Patched is_custom_client() to always return true"

          # Verify the patch applied
          grep -n "is_custom_client" libs/hbb_common/src/config.rs

      
      # ── patch source: disable installation mode ──
      - name: Patch for disable installation mode
        shell: bash
        run: |
          # Patch conifg.rs to disable installation
          sed -i 's/pub fn is_disable_installation() -> bool {/pub fn is_disable_installation() -> bool { return true; \/\/ patched for quick-support/' \
            libs/hbb_common/src/config.rs
          echo "Patched is_disable_installation() to always return true"

          # Verify the patch applied
          grep -n "is_disable_installation" libs/hbb_common/src/config.rs

      # ── patch source: hide server config from About page ──
      - name: Hide server config from About page
        shell: bash
        run: |
          # Make get_license() always return empty string so Key/Host/API
          # are never shown in the About section
          sed -i 's/pub fn get_license() -> String {/pub fn get_license() -> String { return Default::default(); \/\/ patched: hide server config/' \
            src/ui_interface.rs
          echo "Patched get_license() to return empty string"

          # Verify the patch applied
          grep -n "get_license" src/ui_interface.rs
      
      # ── LLVM / Clang ──
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      # ── Flutter ──
      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{ env.FLUTTER_VERSION }} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      # ── Rust ──
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      # ── vcpkg ──
      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      # ── build ──
      - name: Build rustdesk
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

          # Download usbmmidd_v2 (virtual display driver)
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./rustdesk

          # Download printer driver (optional, ignore errors)
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums
            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4\.zip$').Matches.Groups[1].Value
            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
            $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
              Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
              mkdir ./rustdesk/drivers
              mv -Force .\rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
              Expand-Archive printer_driver_adapter.zip -DestinationPath .
              mv -Force .\printer_driver_adapter.dll ./rustdesk
            }
          } catch {
            Write-Host "Ignore the printer driver error."
          }

      # ── find Runner.res for portable packer ──
      - name: Find Runner.res
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res")
          if [ "$runner_res" == "" ]; then
            echo "Runner.res: not found"
          else
            echo "Runner.res: $runner_res"
            cp $runner_res ./libs/portable/Runner.res
            ls -l ./libs/portable/Runner.res
          fi

      # ── add TopMostWindow DLL ──
      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@master
        with:
          name: topmostwindow-artifacts
          path: "./rustdesk"

      # ── build self-extracted portable exe ──
      - name: Build self-extracted executable
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-${{ env.VERSION }}-x86_64-quicksupport.exe

      # ── upload ──
      - name: Upload portable executable
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-quicksupport-windows-x86_64
          path: ./SignOutput/rustdesk-${{ env.VERSION }}-x86_64-quicksupport.exe

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ./SignOutput/rustdesk-*.exe
